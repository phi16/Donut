<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Donut</title>
    <style>
      #code-editor {
        position: absolute;
        top: 0;
        right: 0;
        width: 400px;
        height: 100vh;
        background: rgba(30, 30, 30, 0.95);
        border-left: 2px solid #333;
        display: flex;
        flex-direction: column;
        z-index: 10;
      }
      #code-input {
        flex: 1;
        margin: 10px;
        padding: 10px;
        background: #2d2d2d;
        color: #d4d4d4;
        border: 1px solid #444;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 14px;
        resize: none;
        outline: none;
      }
      #entry-select {
        margin: 0 10px 5px 10px;
        padding: 8px;
        background: #2d2d2d;
        color: #d4d4d4;
        border: 1px solid #444;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 14px;
        outline: none;
      }
      #eval-result {
        margin: 0 10px 5px 10px;
        padding: 8px;
        color: #aaa;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 13px;
        min-height: 20px;
        white-space: pre-line;
        line-height: 1.4;
      }
      #eval-result.evaluable {
        color: #e0e0e0;
      }
      #diagnostics {
        margin: 0 10px 10px 10px;
        padding: 8px;
        color: #f88;
        background: rgba(255, 60, 60, 0.1);
        border-left: 3px solid #f44;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 12px;
        white-space: pre-line;
        line-height: 1.4;
        max-height: 150px;
        overflow-y: auto;
        display: none;
      }
      #diagnostics.has-errors {
        display: block;
      }
    </style>
  </head>
  <body style="margin:0;padding:0;height:100%;overflow:hidden">
    <canvas id="canvas" style="display:block"></canvas>
    <div id="code-editor">
      <textarea id="code-input" placeholder="Ctrl+Enter to update"></textarea>
      <select id="entry-select"></select>
      <div id="eval-result"></div>
      <div id="diagnostics"></div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
